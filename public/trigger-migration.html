<!DOCTYPE html>
<html>
<head>
    <title>Trigger Migration</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; background: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #2563eb; }
        #status { margin-top: 20px; font-family: monospace; padding: 15px; background: #1e293b; border-radius: 8px; width: 80%; max-height: 50vh; overflow-y: auto; display: none; }
    </style>
</head>
<body>
    <h1>Lark Database Migration Trigger</h1>
    <button id="migrateBtn">START MIGRATION</button>
    <div id="status"></div>

    <script>
        document.getElementById('migrateBtn').addEventListener('click', async () => {
            const btn = document.getElementById('migrateBtn');
            const status = document.getElementById('status');
            btn.disabled = true;
            btn.textContent = 'MIGRATING...';
            status.style.display = 'block';
            status.textContent = 'Starting migration in background (this may take a few minutes)...';

            try {
                const response = await fetch('/api/lark/migrate-all', { method: 'POST' });
                const data = await response.json();
                status.textContent = JSON.stringify(data, null, 2);
                btn.textContent = 'MIGRATION COMPLETE';
            } catch (error) {
                status.textContent = 'Error: ' + error.message;
                btn.textContent = 'MIGRATION FAILED';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
